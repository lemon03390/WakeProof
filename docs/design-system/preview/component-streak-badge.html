<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="_shared.css" />
</head>
<body>
  <div class="card" style="padding: 24px 28px;">
    <div style="display:flex; flex-direction:column; gap: 14px;">
      <!-- Active streak -->
      <div style="display:flex; align-items:center; gap: 20px; padding: 18px 22px; background: var(--wp-cream-50); border-radius: 20px; box-shadow: var(--wp-shadow-sm);">
        <div class="wp-text-gradient" style="font-family: var(--wp-font-display); font-size: 64px; font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums;">4</div>
        <div>
          <div style="font-family: var(--wp-font-body); font-size: 17px; font-weight: 600; color: var(--wp-fg-primary);">4-day streak</div>
          <div style="font-family: var(--wp-font-body); font-size: 15px; color: var(--wp-fg-secondary); margin-top: 2px;">Best: 11 days</div>
        </div>
      </div>
      <!-- Reset state -->
      <div style="padding: 14px 22px; background: transparent;">
        <div style="font-family: var(--wp-font-body); font-size: 15px; font-style: italic; color: var(--wp-fg-secondary);">Streak reset — tomorrow's a fresh start.</div>
      </div>
    </div>
  </div>
</body>
</html>
