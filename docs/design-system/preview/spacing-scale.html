<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="_shared.css" />
</head>
<body>
  <div class="card">
    <div style="display:flex; gap:18px; align-items:flex-end; flex-wrap:wrap;">
      <div style="text-align:center;">
        <div class="swatch" style="width: 4px; height: 40px; background: var(--wp-char-500); border-radius: 2px; margin: 0 auto;"></div>
        <div class="label" style="margin-top:6px;">1 · 4px</div>
      </div>
      <div style="text-align:center;">
        <div class="swatch" style="width: 8px; height: 40px; background: var(--wp-char-500); border-radius: 2px; margin: 0 auto;"></div>
        <div class="label" style="margin-top:6px;">2 · 8</div>
      </div>
      <div style="text-align:center;">
        <div class="swatch" style="width: 12px; height: 40px; background: var(--wp-char-500); border-radius: 2px; margin: 0 auto;"></div>
        <div class="label" style="margin-top:6px;">3 · 12</div>
      </div>
      <div style="text-align:center;">
        <div class="swatch" style="width: 16px; height: 40px; background: var(--wp-char-700); border-radius: 2px; margin: 0 auto;"></div>
        <div class="label" style="margin-top:6px;">4 · 16</div>
      </div>
      <div style="text-align:center;">
        <div class="swatch" style="width: 20px; height: 40px; background: var(--wp-char-700); border-radius: 2px; margin: 0 auto;"></div>
        <div class="label" style="margin-top:6px;">5 · 20</div>
      </div>
      <div style="text-align:center;">
        <div class="swatch" style="width: 24px; height: 40px; background: var(--wp-char-700); border-radius: 2px; margin: 0 auto;"></div>
        <div class="label" style="margin-top:6px;">6 · 24</div>
      </div>
      <div style="text-align:center;">
        <div class="swatch" style="width: 32px; height: 40px; background: var(--wp-char-900); border-radius: 2px; margin: 0 auto;"></div>
        <div class="label" style="margin-top:6px;">8 · 32</div>
      </div>
      <div style="text-align:center;">
        <div class="swatch" style="width: 40px; height: 40px; background: var(--wp-char-900); border-radius: 2px; margin: 0 auto;"></div>
        <div class="label" style="margin-top:6px;">10 · 40</div>
      </div>
      <div style="text-align:center;">
        <div class="swatch" style="width: 48px; height: 40px; background: var(--wp-char-900); border-radius: 2px; margin: 0 auto;"></div>
        <div class="label" style="margin-top:6px;">12 · 48</div>
      </div>
      <div style="text-align:center;">
        <div class="swatch" style="width: 64px; height: 40px; background: var(--wp-char-900); border-radius: 2px; margin: 0 auto;"></div>
        <div class="label" style="margin-top:6px;">16 · 64</div>
      </div>
    </div>
    <p class="note" style="margin:18px 0 0;">4pt base grid. Screen padding = space&#8209;8 (32px). Section gap = space&#8209;6 (24px) — matches the <code style="font-family:var(--wp-font-mono); font-size:12px;">VStack(spacing: 24)</code> that recurs through the Swift views.</p>
  </div>
</body>
</html>
