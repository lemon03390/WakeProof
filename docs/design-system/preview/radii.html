<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="_shared.css" />
</head>
<body>
  <div class="card">
    <div style="display:grid; grid-template-columns: repeat(6, 1fr); gap: 14px; text-align:center;">
      <div>
        <div style="height: 70px; background: var(--wp-cream-50); border-radius: 6px; box-shadow: var(--wp-shadow-sm);"></div>
        <div class="label" style="margin-top:8px;">xs · 6</div>
      </div>
      <div>
        <div style="height: 70px; background: var(--wp-cream-50); border-radius: 10px; box-shadow: var(--wp-shadow-sm);"></div>
        <div class="label" style="margin-top:8px;">sm · 10</div>
      </div>
      <div>
        <div style="height: 70px; background: var(--wp-cream-50); border-radius: 14px; box-shadow: var(--wp-shadow-sm);"></div>
        <div class="label" style="margin-top:8px;">md · 14 · button</div>
      </div>
      <div>
        <div style="height: 70px; background: var(--wp-cream-50); border-radius: 20px; box-shadow: var(--wp-shadow-md);"></div>
        <div class="label" style="margin-top:8px;">lg · 20 · card</div>
      </div>
      <div>
        <div style="height: 70px; background: var(--wp-cream-50); border-radius: 28px; box-shadow: var(--wp-shadow-md);"></div>
        <div class="label" style="margin-top:8px;">xl · 28 · hero</div>
      </div>
      <div>
        <div style="height: 70px; background: var(--wp-cream-50); border-radius: 999px; box-shadow: var(--wp-shadow-md);"></div>
        <div class="label" style="margin-top:8px;">pill · alarm CTA</div>
      </div>
    </div>
  </div>
</body>
</html>
