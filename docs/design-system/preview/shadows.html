<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="_shared.css" />
</head>
<body>
  <div class="card">
    <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 16px; text-align:center;">
      <div>
        <div style="height: 90px; background: var(--wp-cream-50); border-radius: 14px; box-shadow: var(--wp-shadow-sm);"></div>
        <div class="label" style="margin-top:10px;">shadow-sm</div>
        <div class="note" style="font-size:11px; margin-top:2px;">rows, subtle lift</div>
      </div>
      <div>
        <div style="height: 90px; background: var(--wp-cream-50); border-radius: 14px; box-shadow: var(--wp-shadow-md);"></div>
        <div class="label" style="margin-top:10px;">shadow-md</div>
        <div class="note" style="font-size:11px; margin-top:2px;">cards, banners</div>
      </div>
      <div>
        <div style="height: 90px; background: var(--wp-cream-50); border-radius: 20px; box-shadow: var(--wp-shadow-lg);"></div>
        <div class="label" style="margin-top:10px;">shadow-lg</div>
        <div class="note" style="font-size:11px; margin-top:2px;">hero, modal</div>
      </div>
      <div>
        <div style="height: 90px; background: var(--wp-gradient-primary); border-radius: 999px; box-shadow: var(--wp-shadow-accent);"></div>
        <div class="label" style="margin-top:10px;">shadow-accent</div>
        <div class="note" style="font-size:11px; margin-top:2px;">CTA glow</div>
      </div>
    </div>
    <p class="note" style="margin:18px 0 0;">All shadows use warm-charcoal rgba, not black. On dark surfaces, shadows are replaced with a 1px inner highlight — shadows don't read on Char&nbsp;900.</p>
  </div>
</body>
</html>
