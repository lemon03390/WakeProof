<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="_shared.css" />
</head>
<body>
  <div class="card">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:14px;">
      <div>
        <div class="swatch" style="height: 120px; background: var(--wp-verified-500);"></div>
        <div style="margin-top:8px;"><div class="label">Verified · streak green</div><div class="hex">#4E8F47</div></div>
      </div>
      <div>
        <div class="swatch" style="height: 120px; background: var(--wp-attempted-500);"></div>
        <div style="margin-top:8px;"><div class="label">Attempted · burnt amber</div><div class="hex">#E07A2E</div></div>
      </div>
      <div>
        <div class="swatch" style="height: 120px; background: var(--wp-warning-500);"></div>
        <div style="margin-top:8px;"><div class="label">Warning · banner</div><div class="hex">#E6B54A</div></div>
      </div>
      <div>
        <div class="swatch" style="height: 120px; background: var(--wp-danger-500);"></div>
        <div style="margin-top:8px;"><div class="label">Danger · security banner</div><div class="hex">#C94A3A</div></div>
      </div>
    </div>
    <p class="note" style="margin:16px 0 0;">Semantic supports, all warm-shifted. No cold blues, no leaf-green; Verified is intentionally warm-leafy to live alongside cream.</p>
  </div>
</body>
</html>
