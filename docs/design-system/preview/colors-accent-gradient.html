<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="_shared.css" />
</head>
<body>
  <div class="card">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px; align-items:stretch;">
      <div>
        <div class="swatch" style="height: 140px; background: var(--wp-orange-500);"></div>
        <div style="margin-top:8px; display:flex; justify-content:space-between;">
          <span class="label">Orange 500 · start</span>
          <span class="hex">#FFA047</span>
        </div>
      </div>
      <div>
        <div class="swatch" style="height: 140px; background: var(--wp-coral-500);"></div>
        <div style="margin-top:8px; display:flex; justify-content:space-between;">
          <span class="label">Coral 500 · end</span>
          <span class="hex">#F54F4F</span>
        </div>
      </div>
    </div>
    <div style="margin-top: 16px;">
      <div class="swatch" style="height: 96px; background: var(--wp-gradient-primary);"></div>
      <div style="margin-top:8px; display:flex; justify-content:space-between;">
        <span class="label">Primary gradient · 135°</span>
        <span class="hex">#FFA047 → #F54F4F</span>
      </div>
    </div>
    <p class="note" style="margin:14px 0 0;">The signature. Hero numerals, primary CTA, streak-digit emphasis. Direction 135° matches the AppIcon's ring.</p>
  </div>
</body>
</html>
