<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="_shared.css" />
</head>
<body>
  <div class="card card--dark">
    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:14px;">
      <div>
        <div class="swatch" style="height: 110px; background: var(--wp-char-950); box-shadow: 0 0 0 1px rgba(251,238,219,0.08) inset;"></div>
        <div style="margin-top:8px;"><div class="label">Char 950</div><div class="hex">#1A120C</div></div>
      </div>
      <div>
        <div class="swatch" style="height: 110px; background: var(--wp-char-900); box-shadow: 0 0 0 1px rgba(251,238,219,0.08) inset;"></div>
        <div style="margin-top:8px;"><div class="label">Char 900 · hero bg</div><div class="hex">#2B1F17</div></div>
      </div>
      <div>
        <div class="swatch" style="height: 110px; background: var(--wp-char-800); box-shadow: 0 0 0 1px rgba(251,238,219,0.08) inset;"></div>
        <div style="margin-top:8px;"><div class="label">Char 800 · card</div><div class="hex">#3D2D22</div></div>
      </div>
      <div>
        <div class="swatch" style="height: 110px; background: var(--wp-char-700); box-shadow: 0 0 0 1px rgba(251,238,219,0.08) inset;"></div>
        <div style="margin-top:8px;"><div class="label">Char 700</div><div class="hex">#554034</div></div>
      </div>
      <div>
        <div class="swatch" style="height: 110px; background: var(--wp-char-500);"></div>
        <div style="margin-top:8px;"><div class="label">Char 500 · label</div><div class="hex">#8A6B55</div></div>
      </div>
      <div>
        <div class="swatch" style="height: 110px; background: var(--wp-char-300);"></div>
        <div style="margin-top:8px;"><div class="label">Char 300 · placeholder</div><div class="hex">#B89A82</div></div>
      </div>
    </div>
    <p class="note" style="margin:20px 0 0;">Warm-charcoal scale. Char&nbsp;900 replaces pure black on AlarmRingingView, MorningBriefingView, DisableChallengeView.</p>
  </div>
</body>
</html>
