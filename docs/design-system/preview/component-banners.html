<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="_shared.css" />
</head>
<body>
  <div class="card" style="padding: 24px;">
    <div style="display:flex; flex-direction:column; gap: 10px;">
      <div style="padding: 14px 18px; border-radius: 14px; background: #FCEBC4; border-left: 3px solid var(--wp-warning-500); color: #7A5A18; font-size: 15px; line-height: 1.45;">
        Notifications are off — WakeProof can't reliably wake you. Open Settings → WakeProof → Notifications.
      </div>
      <div style="padding: 14px 18px; border-radius: 14px; background: #F9DCD6; border-left: 3px solid var(--wp-danger-500); color: #7A2419; font-size: 15px; line-height: 1.45;">
        Security issue: reinstall WakeProof to regenerate identity.
      </div>
      <div style="padding: 14px 18px; border-radius: 14px; background: var(--wp-cream-50); color: var(--wp-fg-secondary); font-size: 14px; line-height: 1.45;">
        Overnight analysis couldn't start tonight — we'll retry next launch.
      </div>
    </div>
  </div>
</body>
</html>
