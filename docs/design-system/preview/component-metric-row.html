<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="_shared.css" />
</head>
<body>
  <div class="card" style="padding: 24px;">
    <div style="display:flex; flex-direction:column; gap: 12px;">
      <div style="display:flex; align-items:center; gap: 20px; padding: 18px 22px; background: var(--wp-cream-50); border-radius: 20px; box-shadow: var(--wp-shadow-sm);">
        <div style="font-family: var(--wp-font-display); font-size: 36px; font-weight: 700; color: var(--wp-fg-primary); line-height: 1; min-width: 120px;">6&nbsp;<span style="font-size: 17px; font-weight: 500; color: var(--wp-fg-secondary);">days ago</span></div>
        <div>
          <div class="wp-headline">Baseline captured</div>
          <div class="wp-subhead" style="color: var(--wp-fg-secondary); margin-top: 2px;">Kitchen counter, 19 Apr 2026</div>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap: 20px; padding: 18px 22px; background: var(--wp-cream-50); border-radius: 20px; box-shadow: var(--wp-shadow-sm);">
        <div class="wp-text-gradient" style="font-family: var(--wp-font-display); font-size: 44px; font-weight: 800; line-height: 1; min-width: 120px; font-variant-numeric: tabular-nums;">12</div>
        <div>
          <div class="wp-headline">Verified mornings</div>
          <div class="wp-subhead" style="color: var(--wp-fg-secondary); margin-top: 2px;">Since baseline</div>
        </div>
      </div>
    </div>
    <p class="note" style="margin: 14px 0 0;">Two-column row: hero numeral left, label+subhint stacked right. Used in <i>Your commitment</i> dashboard.</p>
  </div>
</body>
</html>
