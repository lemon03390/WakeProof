<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="_shared.css" />
</head>
<body>
  <div class="card">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px;">
      <div>
        <div class="swatch" style="height: 120px; background: var(--wp-cream-100);"></div>
        <div style="margin-top:8px; display:flex; justify-content:space-between;">
          <span class="label">Cream 100 · base bg</span>
          <span class="hex">#FBEEDB</span>
        </div>
      </div>
      <div>
        <div class="swatch" style="height: 120px; background: var(--wp-cream-50);"></div>
        <div style="margin-top:8px; display:flex; justify-content:space-between;">
          <span class="label">Cream 50 · elevated</span>
          <span class="hex">#FEF8ED</span>
        </div>
      </div>
      <div>
        <div class="swatch" style="height: 120px; background: var(--wp-cream-200);"></div>
        <div style="margin-top:8px; display:flex; justify-content:space-between;">
          <span class="label">Cream 200 · selected</span>
          <span class="hex">#F5E3C7</span>
        </div>
      </div>
      <div>
        <div class="swatch" style="height: 120px; background: var(--wp-cream-300);"></div>
        <div style="margin-top:8px; display:flex; justify-content:space-between;">
          <span class="label">Cream 300 · pressed</span>
          <span class="hex">#EAD3AD</span>
        </div>
      </div>
    </div>
    <p class="note" style="margin:20px 0 0;">Warm cream surface scale. Replaces pure white across the app — pure white is cold against the AppIcon's cream canvas.</p>
  </div>
</body>
</html>
