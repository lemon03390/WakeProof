<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="_shared.css" />
</head>
<body>
  <div class="card card--dark" style="padding: 28px;">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 14px;">
      <div>
        <button class="wp-btn wp-btn--white" style="width:100%;">Enable notifications</button>
        <div class="label" style="color:rgba(251,238,219,0.55); margin-top:10px;">primaryWhite · onboarding CTA</div>
      </div>
      <div>
        <button class="wp-btn wp-btn--confirm" style="width:100%;">Save &amp; continue</button>
        <div class="label" style="color:rgba(251,238,219,0.55); margin-top:10px;">primaryConfirm · baseline save</div>
      </div>
      <div>
        <button class="wp-btn wp-btn--muted" style="width:100%;">Save &amp; continue</button>
        <div class="label" style="color:rgba(251,238,219,0.55); margin-top:10px;">primaryMuted · disabled</div>
      </div>
      <div style="display:flex; align-items:center; justify-content:center;">
        <button style="background:transparent; border:none; color: rgba(251,238,219,0.65); font-family: var(--wp-font-body); font-size:16px; font-weight:500; cursor:pointer; padding: 10px 16px;">Cancel</button>
      </div>
    </div>
    <p class="note" style="color: rgba(251,238,219,0.55); margin:16px 0 0;">Onboarding + disable-challenge variants. Extends the repo's existing PrimaryButtonStyle names.</p>
  </div>
</body>
</html>
