<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 2160" width="3840" height="2160">
  <defs>
    <linearGradient id="sunriseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFA047"/>
      <stop offset="100%" stop-color="#F54F4F"/>
    </linearGradient>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#FFA047" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFA047" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: deep char-950 (never pure black per brand) -->
  <rect width="3840" height="2160" fill="#1A120C"/>

  <!-- Ultra-subtle warm glow at center, suggests sunrise on horizon -->
  <rect width="3840" height="2160" fill="url(#centerGlow)"/>

  <!-- Line 1: "More than an alarm." -->
  <text x="1920" y="960"
        text-anchor="middle"
        font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif"
        font-size="150"
        font-weight="300"
        letter-spacing="4"
        fill="#FBEEDB">More than an alarm.</text>

  <!-- Divider: small sunrise gradient bar (visual breath between two statements) -->
  <rect x="1870" y="1080" width="100" height="4" rx="2" fill="url(#sunriseGrad)"/>

  <!-- Line 2: "Your self-commitment." -->
  <text x="1920" y="1300"
        text-anchor="middle"
        font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif"
        font-size="150"
        font-weight="300"
        letter-spacing="4"
        fill="#FBEEDB">Your self-commitment.</text>
</svg>
